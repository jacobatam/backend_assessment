server:
  port: 8080

spring:

  datasource:
    url: jdbc:postgresql://localhost:5432/assessment
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

  redis:
    host: localhost
    port: 6379

app:
  jwt:
    secret: secretsecretsecretsecretsecretsecret